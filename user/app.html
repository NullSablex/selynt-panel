<?php if ($bin_ok && $name !== ''): ?>
<script src="<?= $pluginBase ?>/images/assets/js/fontawesome.min.js?v=<?= $v ?>"></script>
<script src="<?= $pluginBase ?>/images/assets/js/solid.min.js?v=<?= $v ?>"></script>

<script type="module" src="<?= $pluginBase ?>/images/assets/js/panel.min.js?v=<?= $v ?>"></script>
<script type="module">
import { toast, confirm as slyConfirm } from '<?= $pluginBase ?>/images/assets/js/script.min.js?v=<?= $v ?>';

const NAME=<?= json_encode($name) ?>,API='/CMD_PLUGINS/selynt_panel/api';
let activeTab='out',nodeVersions=[];
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
function uptime(ts){let s=Math.floor(Date.now()/1000-ts);if(s<60)return'agora';const u=[[31536000,'ano','anos'],[2592000,'mês','meses'],[86400,'dia','dias'],[3600,'hora','horas'],[60,'minuto','minutos']];const p=[];for(const[d,sg,pl] of u){const v=Math.floor(s/d);if(v>0){p.push(v+' '+(v===1?sg:pl));s%=d;}if(p.length===2)break;}return p.join(' e ');}

await fetch(`${API}/nodes.raw`).then(r=>r.json()).then(r=>{if(r&&r.ok)nodeVersions=r.versions||[];}).catch(()=>{});

function iconFor(type){
  if(type==='node') return {icon:'fa-brands fa-node-js',cls:'icon-node'};
  if(type==='rust') return {icon:'fa-solid fa-gears',cls:''};
  return {icon:'fa-solid fa-cube',cls:''};
}
function typeLabel(t){
  if(t==='node') return 'Node.js';
  if(t==='rust') return 'Binário Rust';
  return t.charAt(0).toUpperCase()+t.slice(1);
}

function tab(t){
  activeTab=t;
  document.querySelectorAll('.log-tab-btn').forEach((b,i)=>b.classList.toggle('active',['out','err'][i]===t));
  document.querySelectorAll('.log-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+t).classList.add('active');
  loadLog(t);
}
window.tab=tab;

async function loadStatus(){
  const r=await fetch(`${API}/apps.raw`).then(r=>r.json()).catch(()=>null);
  if(!r||!r.ok)return;
  const a=(r.apps||[]).find(a=>a.name===NAME);if(!a)return;
  const run=a.status==='RUNNING';

  const ic=iconFor(a.type);
  document.getElementById('app-icon').innerHTML=`<i class="${ic.icon}${ic.cls?' '+ic.cls:''}"></i>`;

  const bdg=document.getElementById('app-badge');
  bdg.textContent=run?'Online':'Offline';
  bdg.className='badge '+(run?'badge-online':'badge-offline');

  const rows=[
    ['fa-solid fa-server','Tipo',typeLabel(a.type)],
    ['fa-solid fa-globe','Host',esc(a.host)],
    ['fa-solid fa-folder','Diretório',esc(a.cwd)],
    ['fa-solid fa-file-code','Entrada',esc(a.entry||'—')],
  ];
  if(a.type==='node'){
    const nv=nodeVersions.find(v=>v.path===a.node_version);
    const label=nv?nv.label:(a.node_version?'Versão configurada':'Padrão do sistema');
    if(!run&&nodeVersions.length>1){
      const opts=nodeVersions.map(v=>`<option value="${esc(v.path)}"${v.path===a.node_version?' selected':''}>${esc(v.label)}</option>`).join('');
      rows.push(['fa-brands fa-node-js','Node.js',`<select id="nv-select" class="inline-select">${opts}</select> <button class="btn-xs btn-soft" onclick="changeNodeVersion()"><i class="fa-solid fa-check"></i></button>`]);
    } else {
      rows.push(['fa-brands fa-node-js','Node.js',esc(label)]);
    }
  }
  if(run&&a.started_at) rows.push(['fa-solid fa-clock','Ativo há',uptime(a.started_at)]);
  rows.push(['fa-regular fa-calendar','Criado',a.created_at?new Date(a.created_at*1000).toLocaleString():'—']);
  document.getElementById('app-info').innerHTML=rows.map(([ic,lbl,val])=>
    `<div class="stat-row"><span class="stat-label"><i class="${ic}"></i> ${lbl}</span><span class="stat-value">${val}</span></div>`
  ).join('');

  let btns='';
  if(run){
    btns+=`<button class="btn-xs btn-soft" onclick="act('restart')"><i class="fa-solid fa-arrows-rotate"></i> Reiniciar</button>`;
    btns+=`<button class="btn-xs btn-danger" onclick="act('stop')"><i class="fa-solid fa-stop"></i> Parar</button>`;
  } else {
    btns+=`<button class="btn-xs btn-soft" onclick="act('start')"><i class="fa-solid fa-play"></i> Iniciar</button>`;
  }
  btns+=`<button class="btn-xs btn-danger" onclick="doRemove()"><i class="fa-solid fa-trash"></i> Remover</button>`;
  document.getElementById('app-actions').innerHTML=btns;
}

const actLabels={start:'iniciado',stop:'parado',restart:'reiniciado'};
const actConfirm={start:'Iniciar',stop:'Parar',restart:'Reiniciar'};

async function act(a){
  const ok=await slyConfirm({
    title:`${actConfirm[a]||a} app`,
    text:`Deseja ${(actConfirm[a]||a).toLowerCase()} "${NAME}"?`,
    okText:actConfirm[a]||'Sim',
    cancelText:'Cancelar'
  });
  if(!ok)return;
  const p=new URLSearchParams({name:NAME,action:a});
  const r=await fetch(`${API}/action.raw?${p}`,{method:'POST'}).then(r=>r.json()).catch(()=>({ok:false}));
  if(r.ok){
    toast('success',`App ${actLabels[a]||a} com sucesso.`);
  } else {
    toast('error',r.message||r.error||'Erro ao executar ação.');
  }
  loadStatus();
}
window.act=act;

async function changeNodeVersion(){
  const sel=document.getElementById('nv-select');
  if(!sel)return;
  const nv=sel.value;
  const p=new URLSearchParams({name:NAME,action:'set-node-version',node_version:nv});
  const r=await fetch(`${API}/action.raw?${p}`,{method:'POST'}).then(r=>r.json()).catch(()=>({ok:false}));
  if(r.ok){
    toast('success','Versão do Node.js alterada.');
  } else {
    toast('error',r.message||r.error||'Erro ao alterar versão.');
  }
  loadStatus();
}
window.changeNodeVersion=changeNodeVersion;

async function doRemove(){
  const ok=await slyConfirm({title:'Remover app',text:`Deseja remover "${NAME}"?`,okText:'Remover',cancelText:'Cancelar'});
  if(!ok)return;
  const d=await slyConfirm({title:'Excluir arquivos',text:'Deseja excluir os arquivos do app também?',okText:'Sim, excluir',cancelText:'Não, manter'});
  const p=new URLSearchParams({name:NAME,action:'remove'});
  if(d)p.set('delete_dir','1');
  const r=await fetch(`${API}/action.raw?${p}`,{method:'POST'}).then(r=>r.json()).catch(()=>({ok:false}));
  if(r.ok){
    toast('success','App removido com sucesso.');
    setTimeout(()=>{window.location.href='/CMD_PLUGINS/selynt_panel';},1200);
  } else {
    toast('error',r.message||r.error||'Erro ao remover app.');
  }
}
window.doRemove=doRemove;

async function loadLog(t){
  const box=document.getElementById('log-'+t);
  const r=await fetch(`${API}/logs.raw?name=${encodeURIComponent(NAME)}&type=${t}&lines=100`).then(r=>r.json()).catch(()=>null);
  if(!r)return;
  box.textContent=r.ok?(r.lines||[]).join('\n')||'(sem saída)':'Erro: '+(r.message||r.error);
  box.scrollTop=box.scrollHeight;
}
window.loadLog=loadLog;

loadStatus();setInterval(loadStatus,8000);
loadLog('out');
setInterval(()=>loadLog(activeTab),5000);
</script>
<?php endif; ?>
