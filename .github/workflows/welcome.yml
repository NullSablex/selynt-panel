name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    name: Greet new contributors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Obrigado por abrir sua primeira issue! 🎉
            A equipe vai analisar o mais breve possível.
          pr-message: |
            Obrigado pela sua primeira contribuição! 🎉
            Vamos revisar seu PR o mais breve possível.
