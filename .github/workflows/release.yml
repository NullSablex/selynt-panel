name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: none
  actions: none
  issues: none
  pull-requests: none

jobs:
  build:
    name: Build Plugin Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Build minified assets
        run: npm run build

      - name: Read version
        id: ver
        run: |
          VERSION=$(tr -d '[:space:]' < version)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set file permissions
        run: |
          # Permissões uniformes (755) — modelo padrão DA plugins
          find . -type d -exec chmod 755 {} \;
          find . -type f -exec chmod 755 {} \;

          # plugin.conf: 644 (DA reescreve, diradmin precisa ler)
          chmod 644 plugin.conf

      - name: Package plugin
        run: |
          tar -czf /tmp/selynt_panel.tar.gz \
            --exclude='node_modules' \
            --exclude='assets-src' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='build-assets.mjs' \
            --exclude='assets.manifest.json' \
            --exclude='packages.md' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='version' \
            --exclude='install.sh' \
            --exclude='README.md' \
            --exclude='CHANGELOG.md' \
            --exclude='scripts/diag-proxy.sh' \
            --exclude='scripts/package.sh' \
            --exclude='*.tmp' \
            .
          mv /tmp/selynt_panel.tar.gz .

      - name: Verify package
        run: |
          ARCHIVE="selynt_panel.tar.gz"

          echo "Verificando ausência de arquivos dev/build..."
          FORBIDDEN="node_modules|assets-src|package\.json|package-lock|build-assets|assets\.manifest|\.github|\.gitignore|install\.sh|README\.md|CHANGELOG\.md"
          if tar -tzf "$ARCHIVE" | grep -qE "$FORBIDDEN"; then
            echo "ERRO: arquivos indevidos encontrados no pacote:"
            tar -tzf "$ARCHIVE" | grep -E "$FORBIDDEN"
            exit 1
          fi
          echo "OK"

          echo "Verificando assets minificados..."
          for f in panel.min.css panel.min.js script.min.js; do
            tar -tzf "$ARCHIVE" | grep -q "$f" || { echo "FALTANDO: $f"; exit 1; }
          done
          echo "OK"

          echo "Verificando arquivos essenciais..."
          for f in plugin.conf LICENSE lib/common.php; do
            tar -tzf "$ARCHIVE" | grep -q "$f" || { echo "FALTANDO: $f"; exit 1; }
          done
          echo "OK"

          echo "Tamanho do pacote:"
          du -sh "$ARCHIVE"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            selynt_panel.tar.gz \
            --clobber
